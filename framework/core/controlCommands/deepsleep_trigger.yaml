deepsleep:                 # Component object begins
    command: "DEEPSLEEP_WAKEUP"
    trigger: RCU_BT        # Options: RCU_IR (keycode: 6), RCU_BT (keycode: 7), RCU_RF4CE (keycode: 8), 
                           # LAN, WLAN, FRONT_PANEL, CEC, PRESENCE, VOICE
