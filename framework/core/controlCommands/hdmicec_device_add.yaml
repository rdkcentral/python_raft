HdmiCec:
  command: add_device
  description: Add a new HDMI CEC device to the device map
  device:
    name: "GameConsole"
    parent: "VTV"
    language: "eng"
    cec_version: "1.4"
    device_type: "PlaybackDevice"
    power_status: on
    fault: no
    port_id: 1
    number_of_ports: 0
    active_source: false