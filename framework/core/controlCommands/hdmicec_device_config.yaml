HdmiCec:
  command: configure
  description: Initialize HDMI CEC device map
  config:
    emulated_device:
      name: "VTV"
      language: "eng"
      cec_version: "1.4"
      device_type: "TV"
      power_status: "on"
      port_id: 0
      fault: no
      number_of_ports: 4
      active_source: false
    device_map:
      - device:
        name: "VTV"
        language: "eng"
        cec_version: "1.4"
        device_type: "TV"
        power_status: "on"
        fault: no
        port_id: 0
        number_of_ports: 4
        active_source: false
        children: []
