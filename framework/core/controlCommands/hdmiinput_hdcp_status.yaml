hdmiinput:
  command: hdcp_status
  description: Sends the HDCP status of HDMI input ports.
  params:
    port: 0
    state: AUTHENTICATED # Possible values: UNKNOWN, UNAUTHENTICATED,
                         # AUTHENTICATION_IN_PROGRESS, AUTHENTICATION_FAILURE, AUTHENTICATED
    version: VERSION_2_X # UNDEFINED, VERSION_1_X, VERSION_2_X